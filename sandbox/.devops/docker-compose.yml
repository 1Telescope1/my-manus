services:
  manus_sandbox_dev:
    # 1. 定义沙箱开发容器服务，服务名用于 docker compose 内部引用。
    build:
      # 2. 使用 sandbox 项目根目录作为构建上下文。
      context: ../
      # 3. 使用项目根目录的完整沙箱镜像，启动 Supervisor、API、Chrome 和 VNC。
      dockerfile: Dockerfile
    # 4. 将宿主机项目目录挂载到容器 /sandbox，便于容器内直接访问当前代码。
    volumes:
      - ../:/sandbox
      # 5. 使用匿名 volume 保留容器内 node_modules，避免被宿主机目录覆盖。
      - /sandbox/node_modules
    # 6. 暴露 SSH 和沙箱服务端口；宿主机端口在左侧，容器端口在右侧。
    ports:
      - "2222:22"
      - "8080:8080"
      - "5901:5901"
      - "9222:9222"
    # 7. 设置容器运行时环境变量，让服务在容器内监听 8080。
    environment:
      PORT: "8080"
      NODE_ENV: development
    # 8. 固定容器名称，便于本地排查和重启。
    container_name: manus_sandbox_dev
    # 9. 容器异常退出时自动重启，保持开发环境可用。
    restart: always
